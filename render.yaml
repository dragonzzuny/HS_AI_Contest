# 화성ON — Render 배포 Blueprint (24시간 고정 URL, MOCK 모드)
# Render 대시보드 → New + → Blueprint → 이 GitHub 저장소 선택하면 자동 인식됩니다.
# 배포 후 URL 예: https://hwaseong-on.onrender.com
services:
  - type: web
    name: hwaseong-on
    runtime: python
    plan: free
    region: singapore            # 한국과 가까운 리전
    # ordinances_chunks.json(법제처 수집본)은 저장소에 포함되어 있어야 함.
    # kb.json·ontology.json은 빌드시 재생성하여 항상 최신 보장.
    buildCommand: |
      pip install -r backend/requirements.txt
      python scripts/build_kb.py
      python scripts/build_ontology.py
      python scripts/validate_ontology.py
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # 실시간 다국어 답변(Ollama)을 쓰려면 아래에 터널링된 Ollama 주소를 넣으세요.
      # 비워두면 안전한 MOCK 모드(근거검색·인용·환각거부·서류초안)로 동작합니다.
      # - key: OLLAMA_HOST
      #   value: https://<your-ollama-tunnel>
      # - key: GEN_MODEL
      #   value: qwen2.5:14b
