<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화성ON · 외국인 생활민원 AI 안내사</title>
  <meta name="description" content="화성시 거주 외국인을 위한 6개 언어 생활민원 AI 안내사. 자치법규·공식 출처 근거 기반 답변." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo-mark">화성<span>ON</span></div>
      <div class="brand-text">
        <div class="brand-title" id="brand-title">외국인 생활민원 AI 안내사</div>
        <div class="brand-sub">Hwaseong Foreign Resident AI Assistant</div>
      </div>
    </div>
    <nav class="langs" id="langs" aria-label="언어 선택"></nav>
    <div class="mode-badge" id="mode" title="동작 모드">●</div>
  </header>

  <main class="layout">
    <!-- 대화 영역 -->
    <section class="chat-col">
      <div class="messages" id="messages">
        <!-- 환영 히어로 + 주제 카드는 app.js가 렌더 -->
      </div>

      <div class="quick-wrap">
        <div class="quick-label" id="quick-label">자주 묻는 질문</div>
        <div class="quick" id="examples"></div>
      </div>

      <form class="composer" id="composer">
        <input id="input" autocomplete="off" aria-label="질문 입력"
               placeholder="예) 쓰레기는 어떻게 버려요?" />
        <button type="submit" id="send" aria-label="전송">
          <span id="send-label">전송</span>
        </button>
      </form>
    </section>

    <!-- 근거·처리 도우미 패널 -->
    <aside class="side">
      <div class="side-section">
        <div class="panel-head" id="h-sources">
          <span class="ph-icon">📎</span>
          <span>근거 출처</span>
          <span class="hint" id="h-sources-hint">답변의 [번호]를 누르면 강조됩니다</span>
        </div>
        <div id="citations" class="empty-box">질문하면 답변의 근거가 여기에 표시됩니다.</div>
      </div>

      <div class="side-section">
        <div class="panel-head" id="h-helper">
          <span class="ph-icon">⚡</span>
          <span>처리 도우미</span>
        </div>
        <div id="actions" class="empty-box">필요서류 · 신청 링크 · 서류 초안이 여기에 표시됩니다.</div>
      </div>

      <div class="disclaimer" id="disclaimer">
        ⚠️ 안내는 참고용입니다. 최종 확인은 담당기관에 문의하세요.<br />
        🔒 개인정보·인증정보는 저장하지 않습니다.
      </div>
    </aside>
  </main>

  <!-- 서류초안 모달 -->
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div id="modal-title">서류 초안</div>
          <div id="modal-desc" class="modal-desc"></div>
        </div>
        <button class="x" onclick="closeModal()" aria-label="닫기">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-foot">
        <button id="modal-make" class="primary">초안 생성</button>
        <button id="modal-hwpx" class="accent" style="display:none">📑 HWPX(한글)</button>
        <button id="modal-docx" class="ghost" style="display:none">📄 Word</button>
        <button id="modal-download" class="ghost" style="display:none">📥 텍스트</button>
        <button id="modal-copy" class="ghost" style="display:none">복사</button>
      </div>
      <textarea id="modal-result" readonly style="display:none"></textarea>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
